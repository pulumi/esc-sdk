name: PR
permissions:
  contents: read
on:
  pull_request:
    paths-ignore:
      - 'CHANGELOG.md'
      - 'CHANGELOG_PENDING.md'

jobs:
  go:
    name: Build & test Go re-export shim
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Build
        run: cd sdk && go build ./...
      - name: Vet
        run: cd sdk && go vet ./...
      - name: Test
        run: cd sdk && go test ./...
